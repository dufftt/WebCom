server.port=8765
spring.application.name=api_gateway

# Register with Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Routing to your 5 services
spring.cloud.gateway.routes[0].id=customer_service
spring.cloud.gateway.routes[0].uri=lb://CUSTOMER_SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/customer/**

# Repeat for Order, Product, etc.
spring.cloud.gateway.routes[1].id=product_service
spring.cloud.gateway.routes[1].uri=lb://PRODUCT_SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/product/**

# Repeat for Order, Product, etc.
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/order/**

# Repeat for Order, Product, etc.
spring.cloud.gateway.routes[3].id=shipping_service
spring.cloud.gateway.routes[3].uri=lb://SHIPPING-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/shipping/**

# Repeat for Order, Product, etc.
spring.cloud.gateway.routes[4].id=payment_service
spring.cloud.gateway.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/payment/**