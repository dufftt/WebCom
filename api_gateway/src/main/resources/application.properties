server.port=8765
spring.application.name=api-gateway

# Register with Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# temporarily disabling register with eureka for development and need to comment them below later
# eureka.client.register-with-eureka=false
# eureka.client.fetch-registry=false

# Routing to your 5 services
spring.cloud.gateway.routes[0].id=customer_service
spring.cloud.gateway.routes[0].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/customer/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Repeat for Order, Product, etc.
spring.cloud.gateway.routes[1].id=product_service
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/product/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Repeat for Order, Product, etc.
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/order/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Repeat for Order, Product, etc.
spring.cloud.gateway.routes[3].id=shipping_service
spring.cloud.gateway.routes[3].uri=lb://SHIPPING-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/shipping/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# Repeat for Order, Product, etc.
spring.cloud.gateway.routes[4].id=payment_service
spring.cloud.gateway.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/payment/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1


# graphql
spring.graphql.path=/api/graphql
# enabling graphiql
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/igraphql
spring.graphql.cors.allowed-origin-patterns=*

# actuators
management.endpoints.web.exposure.include=*
# management.endpoints.web.base-path=/management
management.endpoint.health.show-details=always

# graphql channels
spring.cloud.gateway.routes[5].id=customer_service_graphql
spring.cloud.gateway.routes[5].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/customer/graphql
spring.cloud.gateway.routes[5].filters[0]=SetPath=/graphql

spring.cloud.gateway.routes[6].id=product_service_graphql
spring.cloud.gateway.routes[6].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/product/graphql
spring.cloud.gateway.routes[6].filters[0]=SetPath=/graphql

spring.cloud.gateway.routes[7].id=order_service_graphql
spring.cloud.gateway.routes[7].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/order/graphql
spring.cloud.gateway.routes[7].filters[0]=SetPath=/graphql

spring.cloud.gateway.routes[8].id=shipping_service_graphql
spring.cloud.gateway.routes[8].uri=lb://SHIPPING-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/shipping/graphql
spring.cloud.gateway.routes[8].filters[0]=SetPath=/graphql
