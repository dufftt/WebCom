<div class="login-page">
  <div class="login-card">
    <h1>Welcome Back</h1>
    <p class="login-type">Login with email</p>

    <form [formGroup]="formData"  class="login-form">
      <div class="input-group">
        <input formControlName="email" type="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <input formControlName="password" type="password" placeholder="Password" required>
      </div>

      <div class="form-actions">
        <label class="remember-me">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>
      <button type="submit" class="main-login-btn" (click)="login()">Login</button>
    </form>
  </div>

  <p class="register-text">Or <a href="#">create an account</a></p>
</div>
