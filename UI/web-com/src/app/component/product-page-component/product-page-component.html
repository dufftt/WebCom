<div class="product-page">
  <!-- Left Side: Image Gallery -->
  <div class="product-gallery">
    <div class="main-image">
      <!-- Gray placeholder from your image -->
      <div class="image-placeholder">
        <img [src]="product?.productImageUrl" alt="{{product?.productName}}">
      </div>
      <button class="nav-next"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>

  <!-- Right Side: Details -->
  <div class="product-info">
    <h1 class="title">${{product?.productName}}</h1>
    <p class="price">${{product?.productPrice}}</p>
    
    <p class="description">
      Revamp your style with the latest designer trends in men's clothing or achieve 
      a perfectly curated wardrobe thanks to our line-up of timeless pieces.
    </p>

    <div class="selection-controls">
      <!-- Quantity Selector -->
      <div class="qty-selector">
        <button>-</button>
        <span>1</span>
        <button>+</button>
      </div>

      <!-- Size Selector -->
      <div class="size-dropdown">
        <span>XL</span>
        <i class="fas fa-chevron-down"></i>
      </div>
    </div>

    <p class="model-info">Height of model: 189 cm. / 6' 2" Size 41</p>

    <div class="action-buttons">
      <button class="btn-cart">Add to Cart</button>
      <button class="btn-buy">Go to Cart</button>
    </div>
  </div>
</div>
