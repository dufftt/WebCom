<div class="register-page">
  <div class="register-card">
    <h1>Create Account</h1>
    <p class="subtitle">Join us today</p>

    <form class="register-form" [formGroup]="registerForm">
      <div class="input-group">
        <input formControlName="name" type="text" placeholder="Full Name" required>
      </div>

      <div class="input-group">
        <input formControlName="mobNumber" type="mob" placeholder="MobNumber" required>
      </div>

      <div class="input-group">
        <input formControlName="email" type="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <input formControlName="password" type="password" placeholder="Password" required>
      </div>

      <button (click)="DoRegister()" type="submit" class="main-register-btn">Register</button>

      <div class="divider">
        <span>Or register with</span>
      </div>

      <div class="social-group">
        <button type="button" class="social-btn google">
          <i class="fab fa-google"></i> Google
        </button>
        <button type="button" class="social-btn apple">
          <i class="fab fa-apple"></i> Apple
        </button>
      </div>
    </form>
  </div>

  <p class="login-text">Already have an account? <a href="#">Login</a></p>
</div>
