<mat-toolbar class="navbar">
    <img src="/webComLogo.png" alt="logo">
    <button matButton>
        <h2 class="nav-title" (click) = "goToHome()">WebCom</h2>
    </button>
    <span class="example-spacer"></span>
    <div class="nav-items-container">
   <app-search-bar-component (searchEvent)="handleSearch($event)"></app-search-bar-component>
   @if (this.authService.isLoggedin()) {

    <button matIconButton aria-label="Cart" (click)="goToCart()">
        <mat-icon>shopping_cart</mat-icon>
    </button>
    <button matIconButton aria-label="Logout user" (click)="logOut()">
      <mat-icon>logout</mat-icon>
    </button>
   }
   @else {
    <button matButton (click)="goToLogin()">Login</button>
    <button matButton (click)="goToRegister()">Register</button>

   }
    
    
    </div>
</mat-toolbar>
