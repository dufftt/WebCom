
syntax = "proto3";

package customer;

option java_multiple_files = true;
option java_package = "com.duft.grpc.customer";
option java_outer_classname = "CustomerProto";

service CustomerService{
    rpc getCustomers(Empty) returns (CustomerWebDTO);
}

message Empty{}

message CustomerWebDTO{
    int32 customerId=1;
    string name=2;
    string mobNumber = 3;
    string email = 4;
}